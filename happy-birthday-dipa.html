<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Dipa 🎂</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
    canvas { display: block; max-width: 100vw; max-height: 90vh; }
    .ctrl {
      display: flex; gap: 14px; margin-top: 12px;
      align-items: center; flex-wrap: wrap; justify-content: center;
    }
    label { color: #d4a0b0; font-size: 13px; font-family: monospace; }
    input[type=text] {
      background: #111; border: 1px solid #d4a0b0; color: #fcd8e8;
      font-family: monospace; font-size: 12px; padding: 4px 8px;
      border-radius: 4px; width: 160px;
    }
    input[type=color] { width: 36px; height: 26px; border: none; background: none; cursor: pointer; padding: 0; }
    button {
      background: transparent; border: 1px solid #d4a0b0; color: #d4a0b0;
      font-family: monospace; font-size: 12px; padding: 5px 14px;
      border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #d4a0b020; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="ctrl">
    <label>Teks: <input type="text" id="txt" value="Happy Birthday Dipa"/></label>
    <label>Warna: <input type="color" id="col" value="#e06080"/></label>
    <button onclick="applyS()">Apply</button>
  </div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight * 0.88, 600);
  canvas.width = size;
  canvas.height = size;
}
resize();
window.addEventListener('resize', resize);

let txt = 'Happy Birthday Dipa';
let baseColor = [224, 96, 128];
let angle = 0;

function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function applyS() {
  txt = document.getElementById('txt').value || 'Happy Birthday Dipa';
  baseColor = hexToRgb(document.getElementById('col').value);
}

function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return [x, y];
}
function rotY(x,y,z,a) { return [x*Math.cos(a)-z*Math.sin(a), y, x*Math.sin(a)+z*Math.cos(a)]; }
function rotX(x,y,z,a) { return [x, y*Math.cos(a)-z*Math.sin(a), y*Math.sin(a)+z*Math.cos(a)]; }
function proj(x,y,z,cx,cy) { const fov=380, s=fov/(fov+z); return [cx+x*s, cy+y*s, s]; }

function buildOutline() {
  const pts = [];
  const total = 40;
  for(let i=0; i<total; i++){
    const t = (i/total)*Math.PI*2;
    const [hx,hy] = heartPoint(t);
    pts.push({hx, hy, hz:0});
  }
  return pts;
}
const outline = buildOutline();

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  const cx = W/2, cy = H/2 + H*0.04;
  const scale = W * 0.024;
  const tiltX = 0.28;

  const projected = outline.map(p => {
    let [rx,ry,rz] = rotY(p.hx*scale, p.hy*scale, p.hz, angle);
    [rx,ry,rz] = rotX(rx,ry,rz, tiltX);
    const [px,py,ps] = proj(rx,ry,rz,cx,cy);
    const depth = (rz+200)/400;
    return {px,py,ps,depth};
  });

  projected.sort((a,b) => a.depth - b.depth);

  const xScale = Math.abs(Math.sin(angle)) * 0.9 + 0.1;

  for(const p of projected){
    const w = 0.25 + p.depth*0.75;
    const alpha = Math.max(0.2, 0.3+p.depth*0.7);

    const r = Math.min(255, Math.round(baseColor[0]*w + 100*(1-w)));
    const g = Math.round(baseColor[1]*w*0.3);
    const b = Math.round(baseColor[2]*w*0.6 + 40*(1-w));

    const fs = Math.max(12, Math.round(W*0.038*p.ps));
    const textW = fs*0.6*txt.length;

    ctx.save();
    ctx.translate(p.px, p.py + fs*0.35);
    ctx.scale(xScale, 1);
    ctx.font = `bold ${fs}px monospace`;
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
    ctx.fillText(txt, -textW/2, 0);
    ctx.restore();
  }

  angle += 0.004;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
